# Nightly digest configuration.
# Tuning relevance = editing this file. No code changes needed.

timezone: Europe/Paris
lookback_hours: 30          # slightly over 24h so a late/failed run doesn't drop items
seen_retention_days: 90     # prune dedupe DB entries older than this

gemini:
  model: gemini-flash-latest
  max_items_per_call: 12    # items per batched summarization call
  max_abstract_chars: 900   # truncate abstracts sent to the model
  request_timeout: 60
  sleep_between_calls: 3    # seconds; stay polite with the free tier

sections:
  - id: ai-ml
    title: AI & ML
    tier: 1
    max_items: 10
  - id: embedded
    title: Embedded & systems
    tier: 2
    max_items: 6
  - id: competitive
    title: Competitive programming
    tier: 3
    max_items: 5
  - id: cs-research
    title: CS research
    tier: 4
    max_items: 6
  - id: repos
    title: Trending repos
    tier: 5
    max_items: 6

scoring:
  # Items from sources with a fixed section must reach this score to be kept.
  include_threshold: 1.5
  # Items with no fixed section (Hacker News) are routed to their best-matching
  # section, and need at least this much keyword score to survive routing.
  route_threshold: 3.0
  # Negative keywords: matching any of these subtracts weight everywhere.
  # This is the funding-round / corporate-news filter.
  negative:
    funding: 4
    "series a": 4
    "series b": 4
    ipo: 4
    valuation: 3
    acquires: 3
    acquisition: 3
    lawsuit: 3
    layoffs: 3
    ceo: 2
    revenue: 2
  keywords:
    ai-ml:
      llm: 3
      "language model": 3
      transformer: 2
      "fine-tun": 2
      benchmark: 2
      "open source model": 3
      "open-weight": 3
      weights: 1
      inference: 2
      quantization: 2
      rlhf: 2
      "reinforcement learning": 2
      diffusion: 2
      multimodal: 2
      agent: 2
      agentic: 2
      reasoning: 2
      dataset: 1
      pytorch: 2
      jax: 2
      cuda: 2
      gpu: 1
      tokenizer: 2
      embedding: 2
      rag: 2
      distillation: 2
      "context window": 2
      moe: 2
      "mixture of experts": 2
    embedded:
      embedded: 3
      firmware: 3
      microcontroller: 3
      rtos: 3
      "real-time": 2
      fpga: 3
      risc-v: 3
      arm: 1
      stm32: 3
      esp32: 3
      kernel: 2
      driver: 2
      bare-metal: 3
      zephyr: 3
      "rust embedded": 3
      soc: 2
      bootloader: 3
      jtag: 3
      "low power": 2
    competitive:
      codeforces: 4
      "competitive programming": 4
      icpc: 4
      codingame: 4
      leetcode: 2
      algorithm: 2
      "data structure": 2
      "segment tree": 4
      "dynamic programming": 3
      graph: 1
      "number theory": 3
      combinatorics: 3
      "editorial": 2
    cs-research:
      "distributed systems": 3
      consensus: 2
      raft: 3
      paxos: 3
      "programming language": 2
      compiler: 3
      "type system": 3
      "formal verification": 3
      database: 2
      "query optimization": 3
      concurrency: 2
      scheduler: 2
      "operating system": 3
      filesystem: 3
      networking: 2
      paper: 1
      sosp: 4
      osdi: 4
      pldi: 4
      popl: 4
      nsdi: 4
      vldb: 4
      sigmod: 4
    repos:
      # trending repos come from a fixed-section source; keywords act as a boost
      framework: 1
      library: 1
      tool: 1
      cli: 1
      self-hosted: 2

sources:
  # ---- Tier 1: AI/ML ----
  - name: arxiv-ai
    kind: arxiv
    section: ai-ml
    weight: 1.5
    categories: [cs.AI, cs.LG, cs.CL]
    max_results: 50
  - name: openai-blog
    kind: rss
    section: ai-ml
    weight: 3
    url: https://openai.com/news/rss.xml
  - name: deepmind-blog
    kind: rss
    section: ai-ml
    weight: 3
    url: https://deepmind.google/blog/rss.xml
  - name: meta-ai-blog
    kind: rss
    section: ai-ml
    weight: 3
    # ai.meta.com/blog/rss/ 404s (no official feed, page is JS-rendered).
    # Meta Engineering's feed covers AI/infra content; keyword scoring filters the rest.
    url: https://engineering.fb.com/feed/
  - name: huggingface-blog
    kind: rss
    section: ai-ml
    weight: 2.5
    url: https://huggingface.co/blog/feed.xml
  - name: anthropic-news
    kind: anthropic_news        # scraper fallback: no official RSS exists
    section: ai-ml
    weight: 3
  - name: hf-trending-models
    kind: huggingface
    section: ai-ml
    weight: 1.5
    limit: 15

  # ---- Tier 2: Embedded & systems ----
  - name: hackaday
    kind: rss
    section: embedded
    weight: 1.5
    url: https://hackaday.com/blog/feed/
  - name: lwn
    kind: rss
    section: embedded
    weight: 2
    url: https://lwn.net/headlines/rss

  # ---- Tier 3: Competitive programming ----
  - name: codeforces-contests
    kind: codeforces
    section: competitive
    weight: 3
    horizon_days: 10            # announce contests starting within N days

  # ---- Tier 4: CS research ----
  - name: arxiv-systems
    kind: arxiv
    section: cs-research
    weight: 1.5
    categories: [cs.DC, cs.OS, cs.PL, cs.DB]
    max_results: 30

  # ---- Tier 5: Trending repos (scraper fallback, most fragile source) ----
  - name: github-trending
    kind: github_trending
    section: repos
    weight: 2
    languages: ["", python, rust, c++]   # "" = overall

  # ---- Cross-tier: routed by keyword score ----
  - name: hackernews
    kind: hackernews
    section: null               # null = route to best-matching section
    weight: 1
    min_points: 80
