name: Nightly digest

on:
  schedule:
    - cron: "30 2 * * *"    # 02:30 UTC — 04:30 in Paris (summer)
  workflow_dispatch: {}      # manual runs for testing

permissions:
  contents: write

concurrency:
  group: nightly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python pipeline/main.py

      - name: Commit data (this push triggers the Vercel deploy)
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "digest: $(date -u +%F)"
          # main can move between checkout and push (a manual push, or another
          # run). Retry with rebase instead of failing outright; on conflict
          # in data/ always keep this run's freshly generated output.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt $attempt) — rebasing onto latest main"
            git fetch origin main
            git rebase -X theirs origin/main
            sleep $(( (RANDOM % 8) + 3 ))
          done
          echo "::error::failed to push digest commit after retries"
          exit 1

      # Optional dead-man's switch: create a free check at healthchecks.io,
      # store its ping URL as the HEALTHCHECK_URL secret, and it will email
      # you when a night silently doesn't run.
      - name: Heartbeat ping
        if: ${{ success() }}
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HC_URL" ]; then
            curl -fsS --retry 3 "$HC_URL" > /dev/null
          fi
